name: Test & Publish Coverage

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore Dependencies
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --configuration Release --no-restore

      - name: Run All xUnit Tests with Coverage
        run: >
          dotnet test tests/VgcCollege.Tests/VgcCollege.Tests.csproj 
          --configuration Release 
          --no-build 
          --verbosity normal 
          --logger "trx;LogFileName=test-results.trx" 
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate HTML Coverage Report
        run: |
          reportgenerator \
            -reports:"./TestResults/**/coverage.cobertura.xml" \
            -targetdir:"./coveragereport" \
            -reporttypes:"Html;Cobertura;JsonSummary" \
            -classfilters:"-*.Migrations.*,-*Program,-*.Views.*"

      - name: Validate and Display Coverage XML
        run: |
          echo "=== Checking for Cobertura XML ==="
          if [ -f "./TestResults/*/coverage.cobertura.xml" ]; then
            XML_FILE=$(find ./TestResults -name "coverage.cobertura.xml" | head -1)
            echo "✅ Found XML at: $XML_FILE"
            echo ""
            echo "=== XML File Size ==="
            wc -c "$XML_FILE"
            echo ""
            echo "=== XML Root Element ==="
            head -5 "$XML_FILE"
            echo ""
            echo "=== XML Line Count ==="
            wc -l "$XML_FILE"
          else
            echo "❌ No Cobertura XML found!"
            find ./TestResults -type f 2>/dev/null | head -20
          fi

      - name: Verify Generated Coverage Report
        run: |
          echo "=== Generated Report Files ==="
          ls -la ./coveragereport/ 2>/dev/null || echo "Directory does not exist!"
          echo ""
          echo "=== Checking Cobertura output in report ==="
          if [ -f "./coveragereport/coverage.cobertura.xml" ]; then
            echo "✅ coverage.cobertura.xml in report"
            head -10 ./coveragereport/coverage.cobertura.xml
          else
            echo "❌ coverage.cobertura.xml NOT in report"
          fi
          echo ""
          echo "=== Checking for index.html ==="
          if [ -f "./coveragereport/index.html" ]; then
            echo "✅ index.html EXISTS"
            head -20 ./coveragereport/index.html
          else
            echo "❌ index.html NOT FOUND!"
          fi
          echo ""
          echo "=== JSON Summary (if generated) ==="
          if [ -f "./coveragereport/Summary.json" ]; then
            cat ./coveragereport/Summary.json
          fi

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./TestResults
          retention-days: 30

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./coveragereport
          retention-days: 30

      - name: Copy Cobertura XML to Report Directory
        run: |
          echo "=== Copying coverage XML to report directory ==="
          SOURCE_XML=$(find ./TestResults -name "coverage.cobertura.xml" | head -1)
          if [ -f "$SOURCE_XML" ]; then
            cp "$SOURCE_XML" ./coveragereport/coverage.cobertura.xml
            echo "✅ Copied: $SOURCE_XML -> ./coveragereport/coverage.cobertura.xml"
            echo "File size: $(wc -c < ./coveragereport/coverage.cobertura.xml) bytes"
          else
            echo "❌ Source XML not found"
          fi

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./coveragereport
          cname: false
          force_orphan: true

      - name: Verify Deployment
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          echo "✅ Deployment step completed"
          echo "GitHub Pages should now be available at:"
          echo "https://nelpho25.github.io/oop-s2-3-mvc-83356/"
