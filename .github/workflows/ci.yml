name: Test & Publish Coverage (xUnit + ReportGenerator)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore Dependencies
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --configuration Release --no-restore

      - name: Run All xUnit Tests with Coverage
        run: >
          dotnet test tests/VgcCollege.Tests/VgcCollege.Tests.csproj 
          --configuration Release 
          --no-build 
          --verbosity normal 
          --logger "trx;LogFileName=test-results.trx" 
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate HTML Coverage Report
        run: |
          reportgenerator \
            -reports:"./TestResults/**/coverage.cobertura.xml" \
            -targetdir:"./coveragereport" \
            -reporttypes:"Html;Cobertura" \
            -assemblyfilters:"+oop_s2_1_mvc_83356" \
            -classfilters:"-*.Migrations.*,-*Program,-*.Views.*"

      - name: Upload Test Results as Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./TestResults
          retention-days: 30

      - name: Upload Coverage Report as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./coveragereport
          retention-days: 30
      - name: Download Coverage Report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report-${{ github.run_number }}
          path: ./coveragereport

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./coveragereport

  deploy:
    # Only deploy to Pages when pushing to master
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    needs: upload-pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Coverage Report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
