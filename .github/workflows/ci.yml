name: Test & Publish Coverage

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore Dependencies
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --configuration Release --no-restore

      - name: Run All xUnit Tests with Coverage
        run: >
          dotnet test tests/VgcCollege.Tests/VgcCollege.Tests.csproj 
          --configuration Release 
          --no-build 
          --verbosity normal 
          --logger "trx;LogFileName=test-results.trx" 
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate HTML Coverage Report
        run: |
          reportgenerator \
            -reports:"./TestResults/**/coverage.cobertura.xml" \
            -targetdir:"./coveragereport" \
            -reporttypes:"Html;Cobertura" \
            -classfilters:"-*.Migrations.*,-*Program,-*.Views.*"

      - name: Verify Coverage Report Generated
        run: |
          echo "=== Checking if coverage XML exists ==="
          find ./TestResults -name "*.xml" -type f 2>/dev/null || echo "No XML files found!"
          echo ""
          echo "=== Checking generated report directory ==="
          ls -la ./coveragereport/ 2>/dev/null || echo "Directory does not exist!"
          echo ""
          echo "=== Checking for index.html ==="
          if [ -f "./coveragereport/index.html" ]; then
            echo "✅ index.html EXISTS"
            head -20 ./coveragereport/index.html
          else
            echo "❌ index.html NOT FOUND!"
            echo "All files in coveragereport:"
            find ./coveragereport -type f 2>/dev/null | head -20
          fi

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./TestResults
          retention-days: 30

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./coveragereport
          retention-days: 30

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./coveragereport
          cname: false
          force_orphan: true

      - name: Verify Deployment
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          echo "✅ Deployment step completed"
          echo "GitHub Pages should now be available at:"
          echo "https://nelpho25.github.io/oop-s2-3-mvc-83356/"
